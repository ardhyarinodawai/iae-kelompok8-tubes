type Ticket {
  id: ID!
  listing_id: Int!
  contract_id: Int!
  tenant_name: String!
  description: String!
  status: String!
  created_at: DateTime
  updated_at: DateTime
}

input CreateTicketInput {
  listing_id: Int!
  contract_id: Int!
  tenant_name: String!
  description: String!
}

extend type Query {
  tickets: [Ticket!]! @all
  ticket(id: ID! @eq): Ticket @find
}

extend type Mutation {
  createTicket(input: CreateTicketInput! @spread): Ticket! @create
}